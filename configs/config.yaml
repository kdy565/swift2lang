# Linear probe: SwiFT features -> word-level decoding on LeBel

data:
  root: data/lebel
  subject: UTS01
  stories: []  # empty = all available
  tr_delay: 5                    # HRF lag in TRs (10s @ 2s TR)
  sequence_length: 20            # SwiFT temporal window
  stride_between_seq: 1
  mni_template: "MNI152_T1_2mm"  # for resampling to MNI space

model:
  swift_ckpt: SwiFT/pretrained_models/contrastive_pretrained.ckpt
  img_size: [96, 96, 96, 20]    # D, H, W, T (SwiFT default)
  patch_size: [6, 6, 6, 1]
  window_size: [4, 4, 4, 4]
  first_window_size: [4, 4, 4, 4]
  embed_dim: 36
  depths: [2, 2, 6, 2]
  num_heads: [3, 6, 12, 24]
  c_multiplier: 2
  in_chans: 1
  attn_drop_rate: 0
  last_layer_full_MSA: True

probe:
  alphas: [0.1, 1, 10, 100, 1000, 10000]  # ridge regularization grid
  val_ratio: 0.15
  cache_features: True
  cache_dir: data/features

baseline:
  alphas: [0.1, 1, 10, 100, 1000, 10000, 100000, 1000000]
  n_voxel_samples: 50000        # max voxels for memory (random sample if >)

eval:
  held_out_stories: ["sweetaspie"]  # story for final evaluation
  candidate_pool: "data/lebel/word_pool.npy"
